<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WUPI OS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="menu-container">
            <button class="paw-btn" id="pawBtn" aria-label="System Menu">
                <img src="paw.png" alt="System Menu" class="paw-img" />
            </button>
            <div class="dropdown-menu" id="dropdownMenu">
                <button class="dropdown-item" id="shutdownBtn">
                    <svg class="menu-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0M12 2v10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Shut Down
                </button>
                <button class="dropdown-item" id="restartBtn">
                    <svg class="menu-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M20.49 15a9 9 0 1 1-2.12-9.36L23 10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Restart
                </button>
                <button class="dropdown-item" id="sleepBtn">
                    <svg class="menu-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Sleep
                </button>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item" id="themeBtn">
                    <svg class="menu-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        <path d="M12 15l3.5-3.5"></path>
                        <path d="M3 21c3 0 5-2 5-2s-2-5-5-5c0 3-2 5-2 5s2 0 2 2z"></path>
                    </svg>
                    Theme
                </button>
                <button class="dropdown-item terminal-item">
                    <svg class="menu-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="18" rx="2" ry="2"/>
                        <path d="M7 9l3 3-3 3M12 15h4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Terminal
                </button>
            </div>

            <!-- THEME CASCADE — aligned directly right of the paw dropdown -->
            <!-- Panel 2: theme picker (only "Aurora" for now) -->
            <div class="dropdown-menu cascade-panel" id="themePanel">
                <div class="dropdown-status-title">Theme</div>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item theme-option" data-theme="Aurora">
                    <span class="swatch swatch-aurora"></span>
                    Aurora
                </button>
            </div>

            <!-- Panel 3: color-code picker (only "Vibrant" for now) -->
            <div class="dropdown-menu cascade-panel" id="colorCodePanel">
                <div class="dropdown-status-title">Color</div>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item colorcode-option" data-colorcode="Vibrant">
                    <span class="swatch swatch-vibrant"></span>
                    Vibrant
                </button>
            </div>
        </div>

        <div class="os-title">WUPI OS</div>

        <div class="right-container">
            <!-- TIGHT STATUS GROUP -->
            <div class="status-group">
                <!-- BLUETOOTH MODULE -->
                <div class="bluetooth-wrapper" id="bluetoothBtn">
                    <div class="status-icon">
                        <svg class="status-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m7 7 10 10-5 5V2l5 5L7 17"></path>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="bluetoothDropdownMenu">
                        <div class="dropdown-status-title">Bluetooth</div>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item bt-toggle-row">
                            <span class="status-dot connected"></span>
                            <span class="toggle-text">Turn Bluetooth Off</span>
                        </button>
                        <div class="dropdown-status-title devices-header" style="display:none;">My Devices</div>
                        <button class="dropdown-item bt-add-btn" id="btAddBtn">
                            <svg class="menu-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Device
                        </button>
                    </div>
                </div>

                <!-- WI-FI MODULE -->
                <div class="wifi-wrapper" id="wifiBtn">
                    <div class="status-icon">
                        <svg class="status-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                            <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                            <path d="M8.53 16.11a6 6 0 0 1 6.94 0"></path>
                            <line x1="12" y1="20" x2="12.01" y2="20" stroke-width="3"></line>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="wifiDropdownMenu">
                        <div class="dropdown-status-title">Wi-Fi Network</div>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item wifi-toggle-row">
                            <span class="status-dot connected"></span>
                            <span class="toggle-text">Turn Wi-Fi Off</span>
                        </button>
                    </div>
                </div>

                <!-- AUDIO MODULE -->
                <div class="audio-wrapper" id="audioBtn">
                    <div class="status-icon">
                        <svg class="status-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="audioDropdownMenu">
                        <div class="dropdown-status-title">Volume</div>
                        <div class="dropdown-divider"></div>
                        <div class="volume-slider-container">
                            <input type="range" id="volumeSlider" min="0" max="100" value="80" class="volume-slider">
                            <span id="volumePercent">80%</span>
                        </div>
                    </div>
                </div>

                <!-- CALENDAR MODULE -->
                <div class="calendar-wrapper" id="calendarBtn">
                    <div class="calendar-icon">
                        <svg class="calendar-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <rect x="10" y="10" width="80" height="80" rx="12" stroke="#ffffff" stroke-width="6" fill="none"/>
                            <line x1="10" y1="32" x2="90" y2="32" stroke="#ffffff" stroke-width="6"/>
                            <g id="calendarGrid"></g>
                        </svg>
                    </div>
                    <div class="dropdown-menu" id="calendarDropdownMenu">
                        <div class="date-display" id="dateDisplay">--</div>
                    </div>
                </div>
            </div>

            <!-- CLOCK MODULE -->
            <div class="clock-wrapper" id="clockBtn">
                <div class="analog-clock">
                    <div class="hand hour-hand"></div>
                    <div class="hand minute-hand"></div>
                    <div class="mark mark-top"></div>
                    <div class="mark mark-right"></div>
                    <div class="mark mark-bottom"></div>
                    <div class="mark mark-left"></div>
                </div>
                <div class="dropdown-menu clock-dropdown" id="clockDropdownMenu">
                    <div class="digital-time" id="digitalTime">--:--:-- AM</div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="aurora-canvas"></canvas>

    <div class="dock-trigger-area">
        <div class="dock-container">
            <div class="dock-item" id="dockChat" aria-label="WUPI Chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <div class="dock-item" id="dockProfile" aria-label="Profile Editor">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="dock-item" id="dockCodex" aria-label="The Codex">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
            </div>
            <div class="dock-item" id="dockGames" aria-label="Games">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="6" y1="11" x2="10" y2="11"></line>
                    <line x1="8" y1="9" x2="8" y2="13"></line>
                    <line x1="15" y1="12" x2="15.01" y2="12"></line>
                    <line x1="18" y1="10" x2="18.01" y2="10"></line>
                    <line x1="17" y1="14.5" x2="17.01" y2="14.5"></line>
                    <line x1="16.5" y1="12.5" x2="16.51" y2="12.5"></line>
                    <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"></path>
                </svg>
            </div>
            <div class="dock-separator"></div>
            <div class="dock-item" id="dockApps" aria-label="Docks">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
        </div>
    </div>

    <!-- ═════════════════ APP WINDOWS (overlay panels) ═════════════════ -->
    <!-- One Tauri window; these are DOM overlays layered over the canvas.
         Glassmorphism + star-culling both work because they share the same
         render surface. z-index: 1000 (above canvas z:1, below top-bar/dock).
         `.app-window` is hidden unless `.show`. -->

    <!-- WUPI Chat — small movable/resizable window, centered -->
    <div class="app-window chat draggable" id="winChat" aria-hidden="true">
        <div class="app-window-header">
            <span class="app-window-title">WUPI Chat</span>
            <button class="app-window-close" data-close="winChat" aria-label="Close">✕</button>
        </div>
        <div class="app-window-body chat-body">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <textarea id="chatInput" class="chat-input" rows="2" placeholder="Message Wupi…  (Enter to send, Shift+Enter for newline)"></textarea>
                <div class="chat-send-row">
                    <button id="chatStopBtn" class="chat-btn chat-stop-btn" disabled>Stop</button>
                    <button id="chatSendBtn" class="chat-btn chat-send-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Editor — centered modal, draggable + resizable -->
    <div class="app-window modal draggable" id="winProfile" aria-hidden="true">
        <div class="app-window-header">
            <span class="app-window-title">Profile Editor</span>
            <button class="app-window-close" data-close="winProfile" aria-label="Close">✕</button>
        </div>
        <div class="app-window-body profile-body">
            <p class="profile-hint">Who Wupi is talking to. Saved live — applies on the next message.</p>
            <label class="field-label">Name</label>
            <input type="text" id="profName" class="field-input" placeholder="How Wupi should address you" />
            <label class="field-label">Role</label>
            <input type="text" id="profRole" class="field-input" placeholder="e.g. Lead Developer, Operator" />
            <label class="field-label">Background</label>
            <textarea id="profBackground" class="field-textarea" rows="4" placeholder="Who you are in this world…"></textarea>
            <label class="field-label">Dynamics</label>
            <textarea id="profDynamics" class="field-textarea" rows="4" placeholder="How Wupi should treat you (tone, relationship)…"></textarea>
            <div class="profile-actions">
                <span class="profile-status" id="profStatus"></span>
                <button id="profSaveBtn" class="field-btn primary">Save</button>
            </div>
        </div>
    </div>

    <!-- The Codex — memory browser, centered modal, larger, draggable + resizable -->
    <div class="app-window modal codex draggable" id="winCodex" aria-hidden="true">
        <div class="app-window-header">
            <span class="app-window-title">The Codex</span>
            <button class="app-window-close" data-close="winCodex" aria-label="Close">✕</button>
        </div>
        <div class="app-window-body codex-body">
            <div class="codex-layout">
                <!-- Left pane: library list + search + add -->
                <div class="codex-sidebar">
                    <div class="codex-toolbar">
                        <input type="text" id="codexSearch" class="codex-search" placeholder="Search lore…" />
                        <button id="codexAddBtn" class="field-btn primary codex-add-btn">+ New</button>
                    </div>
                    <div class="codex-list" id="codexList"></div>
                    <div class="codex-status" id="codexStatus"></div>
                </div>
                <!-- Right pane: reader / editor for the selected entry -->
                <div class="codex-reader" id="codexReader">
                    <div class="codex-reader-empty" id="codexReaderEmpty">
                        Select an entry to read, or add new lore.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Games — launcher surface for WUPI OS simulation/game scenarios. -->
    <div class="app-window modal games draggable" id="winGames" aria-hidden="true">
        <div class="app-window-header">
            <span class="app-window-title">Games</span>
            <button class="app-window-close" data-close="winGames" aria-label="Close">✕</button>
        </div>
        <div class="app-window-body games-body">
            <div class="games-empty">No scenarios installed.</div>
        </div>
    </div>

    <!-- Docks — full-screen "home" launcher grid. Background stays active. -->
    <div class="app-window home" id="winApps" aria-hidden="true">
        <button class="app-window-close home-close" data-close="winApps" aria-label="Close">✕</button>
        <div class="home-grid">
            <div class="home-app" data-open="winChat">
                <div class="home-app-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <span class="home-app-label">WUPI Chat</span>
            </div>
            <div class="home-app" data-open="winProfile">
                <div class="home-app-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <span class="home-app-label">Profile Editor</span>
            </div>
            <div class="home-app" data-open="winCodex">
                <div class="home-app-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </div>
                <span class="home-app-label">The Codex</span>
            </div>
            <div class="home-app" data-open="winGames">
                <div class="home-app-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="6" y1="11" x2="10" y2="11"></line>
                        <line x1="8" y1="9" x2="8" y2="13"></line>
                        <line x1="15" y1="12" x2="15.01" y2="12"></line>
                        <line x1="18" y1="10" x2="18.01" y2="10"></line>
                        <line x1="17" y1="14.5" x2="17.01" y2="14.5"></line>
                        <line x1="16.5" y1="12.5" x2="16.51" y2="12.5"></line>
                        <path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"></path>
                    </svg>
                </div>
                <span class="home-app-label">Games</span>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
