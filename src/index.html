<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WUPI OS</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <span class="brand">🐾 WUPI OS</span>
        <div class="topbar-right">
          <button id="schema-toggle" class="memory-toggle" type="button" title="Schema delta debug panel" aria-label="Toggle schema debug panel">🌍</button>
          <button id="memory-toggle" class="memory-toggle" type="button" title="Memory debug panel" aria-label="Toggle memory debug panel">🧠</button>
          <span id="status" class="status">starting…</span>
        </div>
      </header>

      <main id="chat" class="chat"></main>

      <section id="schema-debug" class="memory-debug hidden">
        <div class="memory-debug-head">
          <span class="memory-debug-title">schema delta (synthetic)</span>
          <button id="schema-debug-close" class="memory-debug-close" type="button" aria-label="Close schema debug panel">×</button>
        </div>
        <div class="schema-debug-query">
          <textarea id="schema-debug-user" class="schema-exchange" rows="2" placeholder="synthetic user turn…" autocomplete="off"></textarea>
          <textarea id="schema-debug-asst" class="schema-exchange" rows="4" placeholder="synthetic assistant turn…" autocomplete="off"></textarea>
          <div class="schema-debug-controls">
            <label class="schema-debug-apply"><input id="schema-debug-apply" type="checkbox" checked /> apply delta</label>
            <button id="schema-debug-run" type="button">run delta</button>
          </div>
        </div>
        <div id="schema-debug-results" class="memory-debug-results"></div>
      </section>

      <section id="memory-debug" class="memory-debug hidden">
        <div class="memory-debug-head">
          <span class="memory-debug-title">memory retrieval</span>
          <button id="memory-debug-close" class="memory-debug-close" type="button" aria-label="Close memory debug panel">×</button>
        </div>
        <div class="memory-debug-query">
          <input id="memory-debug-input" type="text" placeholder="query the memory engine…" autocomplete="off" />
          <button id="memory-debug-run" type="button">search</button>
        </div>
        <div id="memory-debug-results" class="memory-debug-results"></div>
      </section>

      <footer class="composer">
        <textarea
          id="input"
          class="input"
          rows="1"
          placeholder="Ask Wupi something…"
          autocomplete="off"
        ></textarea>
        <button id="send" class="send" type="button">Send</button>
        <button id="stop" class="stop hidden" type="button">Stop</button>
      </footer>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
