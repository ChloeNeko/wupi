# WUPI auto-release: builds + signs the installers on every push to ui-shell,
# publishes a GitHub Release, and writes the Tauri updater manifest
# (latest.json) to the gh-pages branch so the in-app updater has a real
# endpoint to poll.
#
# Result: every commit to ui-shell → beta testers' clients detect + install
# the new build on next launch (or via the paw-menu "Check for Updates").
#
# Required repo Secrets (set once — see docs/UPDATER_SETUP.md):
#   TAURI_SIGNING_PRIVATE_KEY  : contents of ~/.tauri/wupi.key (the minisign
#                                private key from `npm run tauri signer generate`)
#   TAURI_KEY_PASSWORD         : the password you chose at key generation
#
# Versioning: each build gets a monotonically-increasing prerelease tag of the
# form v0.1.0-dev.<unix-timestamp> so the updater always sees a newer version
# than the last installed one (without manual tag management). Set a real
# release version by editing `version` in src-tauri/tauri.conf.json.

name: release

on:
  push:
    branches: [ui-shell]
  workflow_dispatch:    # manual trigger from the Actions tab

permissions:
  contents: write       # publish GitHub Releases + push to gh-pages
  pages: write          # (reserved; we use the gh-pages branch, not the Pages API)

# Serialize: only one release build at a time. A new push cancels the in-flight
# run's Release-publish step (the build still finishes for CI signal, but the
# older release is skipped to avoid clobbering latest.json with stale data).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install npm deps
        run: npm ci

      - name: Compute build version + tag
        id: ver
        shell: bash
        run: |
          # Prerelease tag: v0.1.0-dev.<unix-seconds>. Monotonic across pushes
          # (unix time never goes backward), unique per build, sorts correctly
          # in GitHub's release list. Edit `version` in tauri.conf.json to
          # ship a "real" numbered release instead.
          STAMP=$(date +%s)
          TAG="v0.1.0-dev.${STAMP}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Build signed installers
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # HF_TOKEN is read at compile time by `option_env!("HF_TOKEN")` in
          # model_downloader.rs. The compiled binary has this value baked in;
          # the source contains only the macro call, never the token itself.
          # Without this secret the build succeeds but distributed builds
          # can't download GGUFs (HF returns 401). See docs/UPDATER_SETUP.md.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CMAKE_BUILD_PARALLEL_LEVEL: '8'
        run: npx tauri build

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          # Stage the files the updater needs: the NSIS .exe (installer), the
          # .nsis.zip + .msi.zip (Tauri's updater payloads), and the .sig
          # minisign signatures the client verifies against the pubkey in
          # tauri.conf.json.
          mkdir -p stage
          cp src-tauri/target/release/bundle/nsis/*.exe stage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip stage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.nsis.zip.sig stage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi stage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi.zip stage/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi.zip.sig stage/ 2>/dev/null || true
          ls -la stage/
          # Capture the exact filenames for the manifest step (NSIS is the
          # primary updater target on Windows).
          echo "nsis_zip=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: WUPI ${{ steps.ver.outputs.tag }}
          body: |
            Auto-build from commit ${{ github.sha }} on `ui-shell`.

            **Beta build.** Download `WUPI_*-setup.exe` to install, or use the
            in-app updater (paw menu → Check for Updates) if you already have
            WUPI installed.
          prerelease: true
          files: stage/*
          fail_on_unmatched_files: false

      - name: Publish latest.json manifest to gh-pages
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The Tauri updater polls the endpoint in tauri.conf.json:
          #   https://chloeneko.github.io/WUPI/updater/latest.json
          # We generate that manifest from the just-published release assets
          # and commit it to the gh-pages branch (which GitHub Pages serves).
          #
          # Manifest format (Tauri v2): one object per release with the
          # version, release pub_date, and per-platform download URL + sig.
          set -euo pipefail

          NSIS_ZIP=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)
          SIG_PATH="${NSIS_ZIP}.sig"
          SIG_CONTENT=$(cat "$SIG_PATH" | tr -d '\r\n')
          # GitHub Releases serve stable URLs of the form
          # /releases/download/<tag>/<filename>. No auth needed for public
          # files even on a private repo... but this is a PRIVATE repo, so
          # beta testers' clients must access the manifest + download via
          # unauthenticated download. The gh-pages branch is served publicly
          # by GitHub Pages even for private repos (Pages is always public),
          # so the manifest is reachable; the download URLs point at the GH
          # Release assets which DO require auth on private repos.
          #
          # → For private beta: see docs/UPDATER_SETUP.md (you'll likely
          #   flip the repo to public for the release artifacts, or proxy
          #   through a different host for the binaries).
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.ver.outputs.tag }}/$(basename "$NSIS_ZIP")"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="${{ steps.ver.outputs.tag }}"

          MANIFEST=$(cat <<EOF
          {
            "version": "${VERSION#v}",
            "notes": "Auto-build from commit ${{ github.sha }}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIG_CONTENT}",
                "url": "${ASSET_URL}"
              }
            }
          }
          EOF
          )

          # Write the manifest to a fresh gh-pages branch checkout.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git stash --include-untracked || true
          git checkout gh-pages 2>/dev/null || git checkout -b gh-pages
          mkdir -p updater
          echo "$MANIFEST" > updater/latest.json
          git add updater/latest.json
          git commit -m "Update manifest: ${VERSION} [skip ci]" || echo "no manifest changes"
          git push origin gh-pages

          echo "=== published manifest ==="
          cat updater/latest.json
